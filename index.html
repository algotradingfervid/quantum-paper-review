<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Paper Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3e;
    --accent-green: #00ff88;
    --accent-red: #ff3355;
    --accent-blue: #4488ff;
    --accent-yellow: #ffcc00;
    --text: #e8e8f0;
    --text-dim: #7070a0;
    --text-dimmer: #404060;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(68,136,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(68,136,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; }

  /* ─── HEADER ─── */
  header {
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    backdrop-filter: blur(10px);
    background: rgba(10,10,15,0.85);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 1px;
  }

  .logo-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--accent-green);
    box-shadow: 0 0 12px var(--accent-green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .header-stats {
    display: flex;
    gap: 24px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }

  .stat-val { color: var(--text); font-weight: 500; }
  .stat-val.green { color: var(--accent-green); }
  .stat-val.red { color: var(--accent-red); }

  .header-actions { display: flex; gap: 8px; }

  .btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .btn:hover {
    border-color: var(--accent-blue);
    color: var(--accent-blue);
    background: rgba(68,136,255,0.08);
  }

  /* ─── LAYOUT ─── */
  .main {
    display: grid;
    grid-template-columns: 1fr 340px;
    height: calc(100vh - 57px);
  }

  /* ─── CARD AREA ─── */
  .card-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 32px;
    border-right: 1px solid var(--border);
  }

  .progress-wrap {
    width: 100%;
    max-width: 680px;
    margin-bottom: 18px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dimmer);
    margin-bottom: 5px;
  }

  .progress-bar {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
    transition: width 0.4s ease;
  }

  /* ─── CARD STACK ─── */
  .card-stack {
    position: relative;
    width: 100%;
    max-width: 680px;
    height: 580px;
  }

  .ghost-card {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: var(--surface);
  }

  .ghost-card:nth-child(1) { transform: translateY(7px) scale(0.97); opacity: 0.35; z-index: 1; }
  .ghost-card:nth-child(2) { transform: translateY(14px) scale(0.94); opacity: 0.15; z-index: 0; }

  .paper-card {
    position: absolute;
    inset: 0;
    z-index: 10;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
    cursor: grab;
    user-select: none;
    display: flex;
    flex-direction: column;
    transition: box-shadow 0.2s;
  }

  .paper-card:active { cursor: grabbing; }
  .paper-card.dragging { transition: none; box-shadow: 0 28px 64px rgba(0,0,0,0.6); }

  .paper-card.swipe-right { animation: swipeRight 0.4s ease forwards; }
  .paper-card.swipe-left  { animation: swipeLeft  0.4s ease forwards; }

  @keyframes swipeRight {
    to { transform: translateX(150%) rotate(22deg); opacity: 0; }
  }
  @keyframes swipeLeft {
    to { transform: translateX(-150%) rotate(-22deg); opacity: 0; }
  }

  .swipe-overlay {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    padding: 20px;
    opacity: 0;
    transition: opacity 0.1s;
    z-index: 20;
    pointer-events: none;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 2px;
    display: flex;
    align-items: flex-start;
  }

  .swipe-overlay.accept {
    background: linear-gradient(135deg, rgba(0,255,136,0.12) 0%, transparent 60%);
    color: var(--accent-green);
    border: 2px solid rgba(0,255,136,0.25);
    justify-content: flex-start;
  }

  .swipe-overlay.reject {
    background: linear-gradient(225deg, rgba(255,51,85,0.12) 0%, transparent 60%);
    color: var(--accent-red);
    border: 2px solid rgba(255,51,85,0.25);
    justify-content: flex-end;
  }

  /* Card sections */
  .card-header {
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  .topic-badge {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    padding: 3px 7px;
    border-radius: 4px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }

  .topic-Gate_Calibration    { background: rgba(124,58,237,0.15); color: #a78bfa; border: 1px solid rgba(124,58,237,0.3); }
  .topic-DC_Cryogenic        { background: rgba(8,145,178,0.15); color: #22d3ee; border: 1px solid rgba(8,145,178,0.3); }
  .topic-Microwave_Cryogenic { background: rgba(5,150,105,0.15); color: #34d399; border: 1px solid rgba(5,150,105,0.3); }
  .topic-High-Freq_Waveguides { background: rgba(217,119,6,0.15); color: #fbbf24; border: 1px solid rgba(217,119,6,0.3); }
  .topic-Optical_Fiber__THz  { background: rgba(219,39,119,0.15); color: #f472b6; border: 1px solid rgba(219,39,119,0.3); }
  .topic-General             { background: rgba(107,114,128,0.15); color: #9ca3af; border: 1px solid rgba(107,114,128,0.3); }

  .year-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dimmer);
  }

  .card-authors {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .card-title {
    font-size: 15px;
    font-weight: 700;
    line-height: 1.35;
    letter-spacing: -0.3px;
  }

  .card-body {
    padding: 14px 22px;
    overflow-y: auto;
    flex: 1;
  }

  .card-body::-webkit-scrollbar { width: 4px; }
  .card-body::-webkit-scrollbar-track { background: transparent; }
  .card-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .card-summary {
    font-size: 14px;
    line-height: 1.72;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  .findings-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dimmer);
    margin-bottom: 8px;
  }

  .findings-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .finding-item {
    display: flex;
    gap: 8px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-dim);
  }

  .finding-item::before {
    content: '›';
    color: var(--accent-blue);
    font-family: 'DM Mono', monospace;
    flex-shrink: 0;
    font-size: 13px;
    line-height: 1.4;
  }

  .card-citation {
    padding: 9px 22px;
    border-top: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 9.5px;
    color: var(--text-dimmer);
    line-height: 1.5;
    flex-shrink: 0;
  }

  /* ─── ACTION ROW ─── */
  .action-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-top: 18px;
  }

  .action-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 2px solid;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    transition: all 0.15s;
  }

  .action-btn.reject-btn { border-color: var(--accent-red); color: var(--accent-red); }
  .action-btn.accept-btn { border-color: var(--accent-green); color: var(--accent-green); }

  .action-btn.reject-btn:hover {
    background: rgba(255,51,85,0.1);
    transform: scale(1.1);
    box-shadow: 0 0 20px rgba(255,51,85,0.25);
  }

  .action-btn.accept-btn:hover {
    background: rgba(0,255,136,0.1);
    transform: scale(1.1);
    box-shadow: 0 0 20px rgba(0,255,136,0.25);
  }

  .action-btn:active { transform: scale(0.93); }
  .action-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .action-hint {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dimmer);
    text-align: center;
  }

  .kb-hints {
    display: flex;
    gap: 18px;
    justify-content: center;
    margin-top: 12px;
  }

  .kb-hint {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dimmer);
  }

  .key {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 22px;
    height: 18px;
    padding: 0 4px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--surface2);
    font-size: 9px;
    color: var(--text-dim);
  }

  /* Done screen */
  .done-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 32px;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: var(--surface);
  }

  .done-state h2 {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 10px;
  }

  .done-state p {
    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 24px;
    font-family: 'DM Mono', monospace;
  }

  .done-counts {
    display: flex;
    gap: 40px;
    justify-content: center;
    margin-bottom: 28px;
  }

  .done-count-num {
    font-size: 44px;
    font-weight: 800;
    line-height: 1;
  }

  .done-count-num.green { color: var(--accent-green); text-shadow: 0 0 24px rgba(0,255,136,0.35); }
  .done-count-num.red   { color: var(--accent-red);   text-shadow: 0 0 24px rgba(255,51,85,0.35); }

  .done-count-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dimmer);
    margin-top: 4px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .btn-primary {
    padding: 10px 20px;
    border-radius: 8px;
    border: 1px solid var(--accent-green);
    background: rgba(0,255,136,0.07);
    color: var(--accent-green);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
    margin: 0 5px;
  }

  .btn-primary.blue {
    border-color: var(--accent-blue);
    background: rgba(68,136,255,0.07);
    color: var(--accent-blue);
  }

  .btn-primary:hover {
    filter: brightness(1.2);
    box-shadow: 0 0 16px rgba(0,255,136,0.2);
  }

  .btn-primary.blue:hover {
    box-shadow: 0 0 16px rgba(68,136,255,0.2);
  }

  /* ─── SIDEBAR ─── */
  .sidebar {
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }

  .sidebar-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .sidebar-tab {
    flex: 1;
    padding: 12px 6px;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--text-dimmer);
    border: none;
    background: transparent;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }

  .sidebar-tab.active { color: var(--text); border-bottom-color: var(--accent-blue); }
  .sidebar-tab:hover:not(.active) { color: var(--text-dim); }

  .tab-count {
    display: inline-block;
    margin-left: 4px;
    padding: 1px 5px;
    border-radius: 8px;
    font-size: 9px;
  }

  .tab-count.green { background: rgba(0,255,136,0.12); color: var(--accent-green); }
  .tab-count.red   { background: rgba(255,51,85,0.12);  color: var(--accent-red); }
  .tab-count.blue  { background: rgba(68,136,255,0.12); color: var(--accent-blue); }

  .filter-bar {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .filter-chip {
    padding: 3px 7px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dimmer);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    cursor: pointer;
    transition: all 0.12s;
    letter-spacing: 0.3px;
  }

  .filter-chip.active {
    border-color: var(--accent-blue);
    color: var(--accent-blue);
    background: rgba(68,136,255,0.1);
  }

  .sidebar-panel {
    flex: 1;
    overflow-y: auto;
    display: none;
    padding: 10px;
    flex-direction: column;
    gap: 7px;
  }

  .sidebar-panel.active { display: flex; }

  .sidebar-panel::-webkit-scrollbar { width: 4px; }
  .sidebar-panel::-webkit-scrollbar-track { background: transparent; }
  .sidebar-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sidebar-empty {
    text-align: center;
    padding: 44px 16px;
    color: var(--text-dimmer);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    line-height: 1.9;
  }

  .sidebar-card {
    border-radius: 9px;
    border: 1px solid var(--border);
    background: var(--surface2);
    padding: 10px 12px;
    cursor: pointer;
    transition: border-color 0.12s, background 0.12s;
    position: relative;
  }

  .sidebar-card:hover {
    border-color: var(--accent-blue);
    background: rgba(68,136,255,0.05);
  }

  .sidebar-card.accepted { border-left: 3px solid var(--accent-green); }
  .sidebar-card.rejected { border-left: 3px solid var(--accent-red); }

  .sc-title {
    font-size: 11px;
    font-weight: 600;
    line-height: 1.35;
    margin-bottom: 4px;
    padding-right: 24px;
  }

  .sc-meta {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--text-dimmer);
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }

  .sc-undo {
    position: absolute;
    top: 7px;
    right: 7px;
    width: 20px;
    height: 20px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dimmer);
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.12s;
  }

  .sidebar-card:hover .sc-undo { opacity: 1; }

  .sc-undo:hover {
    border-color: var(--accent-yellow);
    color: var(--accent-yellow);
    background: rgba(255,204,0,0.08);
  }

  /* ─── MODAL ─── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 600px;
    max-height: 82vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    animation: modalIn 0.2s ease;
  }

  @keyframes modalIn {
    from { transform: scale(0.95) translateY(12px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }

  .modal-header {
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    flex-shrink: 0;
  }

  .modal-header h3 { font-size: 15px; font-weight: 700; line-height: 1.3; flex: 1; }

  .modal-close {
    width: 26px; height: 26px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.12s;
  }

  .modal-close:hover { border-color: var(--accent-red); color: var(--accent-red); }

  .modal-body {
    padding: 18px 22px;
    overflow-y: auto;
    flex: 1;
  }

  .modal-body::-webkit-scrollbar { width: 4px; }
  .modal-body::-webkit-scrollbar-track { background: transparent; }
  .modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text);
    opacity: 0;
    transition: all 0.2s;
    z-index: 300;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">
      <div class="logo-dot"></div>
      QUANTUM PAPER REVIEW
    </div>
    <div class="header-stats">
      <span>remaining <span class="stat-val" id="stat-remaining">—</span></span>
      <span>accepted <span class="stat-val green" id="stat-accepted">0</span></span>
      <span>rejected <span class="stat-val red" id="stat-rejected">0</span></span>
    </div>
    <div class="header-actions">
      <button class="btn" onclick="exportData()">&#8595; export</button>
      <button class="btn" onclick="resetAll()">&#8635; reset</button>
    </div>
  </header>

  <div class="main">

    <!-- Card section -->
    <div class="card-area">

      <div class="progress-wrap">
        <div class="progress-info">
          <span>Paper <span id="prog-cur">1</span> of <span id="prog-tot">163</span></span>
          <span id="progress-pct">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>

      <div class="card-stack" id="card-stack">
        <div class="ghost-card"></div>
        <div class="ghost-card"></div>
      </div>

      <div class="action-row">
        <button class="action-btn reject-btn" id="btn-reject" onclick="swipe('reject')" title="Reject (Arrow Left)">&#10005;</button>
        <div class="action-hint">drag or click</div>
        <button class="action-btn accept-btn" id="btn-accept" onclick="swipe('accept')" title="Accept (Arrow Right)">&#10003;</button>
      </div>

      <div class="kb-hints">
        <div class="kb-hint"><span class="key">&#8592;</span> reject</div>
        <div class="kb-hint"><span class="key">&#8594;</span> accept</div>
        <div class="kb-hint"><span class="key">Z</span> undo</div>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" onclick="switchTab('accepted')" id="tab-accepted">
          Accepted <span class="tab-count green" id="tc-accepted">0</span>
        </button>
        <button class="sidebar-tab" onclick="switchTab('rejected')" id="tab-rejected">
          Rejected <span class="tab-count red" id="tc-rejected">0</span>
        </button>
        <button class="sidebar-tab" onclick="switchTab('queue')" id="tab-queue">
          Queue <span class="tab-count blue" id="tc-queue">163</span>
        </button>
      </div>

      <div class="filter-bar">
        <button class="filter-chip active" onclick="setFilter('all',this)">All</button>
        <button class="filter-chip" onclick="setFilter('Gate Calibration',this)">Gate Cal</button>
        <button class="filter-chip" onclick="setFilter('DC Cryogenic',this)">DC Cryo</button>
        <button class="filter-chip" onclick="setFilter('Microwave Cryogenic',this)">MW Cryo</button>
        <button class="filter-chip" onclick="setFilter('High-Freq Waveguides',this)">HF WG</button>
        <button class="filter-chip" onclick="setFilter('Optical Fiber / THz',this)">Optical/THz</button>
      </div>

      <div class="sidebar-panel active" id="panel-accepted"></div>
      <div class="sidebar-panel" id="panel-rejected"></div>
      <div class="sidebar-panel" id="panel-queue"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="modal-close" onclick="closeModal()">&#10005;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── Paper data (injected at build time) ──
</script>
<script src="papers.js"></script>
<script>
const STORAGE_KEY = 'qpr_state_v2';

let state = {
  accepted: [],
  rejected: [],
  queue: PAPERS.map(p => p.id),
  currentIndex: 0
};

let activeTab = 'accepted';
let sidebarFilter = 'all';
let undoHistory = [];

// ── State persistence ──
function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    if (saved) {
      const knownIds = new Set([...saved.accepted, ...saved.rejected, ...saved.queue]);
      const newIds = PAPERS.filter(p => !knownIds.has(p.id)).map(p => p.id);
      state = {
        accepted: saved.accepted || [],
        rejected: saved.rejected || [],
        queue: [...(saved.queue || []), ...newIds],
        currentIndex: saved.currentIndex || 0
      };
    }
  } catch(e) { console.warn('Failed to load saved state', e); }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function getPaper(id) {
  return PAPERS.find(p => p.id === id) || null;
}

function getCurrentPaper() {
  const id = state.queue[state.currentIndex];
  return id ? getPaper(id) : null;
}

// ── Render card ──
function renderCard() {
  const stack = document.getElementById('card-stack');
  const existing = stack.querySelector('.paper-card');
  if (existing) existing.remove();

  const paper = getCurrentPaper();
  if (!paper) { renderDone(); return; }

  const card = document.createElement('div');
  card.className = 'paper-card';
  card.id = 'current-card';

  const topicClass = 'topic-' + paper.topic.replace(/ /g, '_').replace(/\//g, '_');

  const findingsHtml = paper.findings && paper.findings.length
    ? '<div class="findings-label">Key Findings</div><ul class="findings-list">' +
      paper.findings.map(f => '<li class="finding-item">' + esc(f) + '</li>').join('') +
      '</ul>'
    : '';

  card.innerHTML =
    '<div class="swipe-overlay accept" id="ol-accept">ACCEPT &#10003;</div>' +
    '<div class="swipe-overlay reject" id="ol-reject">&#10005; REJECT</div>' +
    '<div class="card-header">' +
      '<div class="card-meta">' +
        '<span class="topic-badge ' + topicClass + '">' + esc(paper.topic) + '</span>' +
        '<span class="year-tag">' + esc(paper.year) + '</span>' +
      '</div>' +
      '<div class="card-authors">' + esc(paper.authors) + '</div>' +
      '<div class="card-title">' + esc(paper.title) + '</div>' +
    '</div>' +
    '<div class="card-body">' +
      '<div class="card-summary">' + esc(paper.summary) + '</div>' +
      findingsHtml +
    '</div>' +
    (paper.citation ? '<div class="card-citation">' + esc(paper.citation) + '</div>' : '');

  stack.appendChild(card);
  setupDrag(card);
  updateStats();
}

function renderDone() {
  const stack = document.getElementById('card-stack');
  const div = document.createElement('div');
  div.className = 'done-state';
  div.innerHTML =
    '<h2>All reviewed!</h2>' +
    '<p>' + PAPERS.length + ' papers processed</p>' +
    '<div class="done-counts">' +
      '<div class="done-count">' +
        '<div class="done-count-num green">' + state.accepted.length + '</div>' +
        '<div class="done-count-label">Accepted</div>' +
      '</div>' +
      '<div class="done-count">' +
        '<div class="done-count-num red">' + state.rejected.length + '</div>' +
        '<div class="done-count-label">Rejected</div>' +
      '</div>' +
    '</div>' +
    '<button class="btn-primary" onclick="exportData()">&#8595; Export Results</button>' +
    '<button class="btn-primary blue" onclick="resetAll()">Start Over</button>';
  stack.appendChild(div);

  document.getElementById('btn-accept').disabled = true;
  document.getElementById('btn-reject').disabled = true;
}

// ── Drag/swipe ──
function setupDrag(card) {
  let startX = 0, startY = 0, active = false;

  function down(e) {
    const pt = e.touches ? e.touches[0] : e;
    startX = pt.clientX; startY = pt.clientY;
    active = true;
    card.classList.add('dragging');
  }

  function move(e) {
    if (!active) return;
    const pt = e.touches ? e.touches[0] : e;
    const dx = pt.clientX - startX;
    const dy = pt.clientY - startY;
    card.style.transform = 'translateX(' + dx + 'px) translateY(' + (dy * 0.25) + 'px) rotate(' + (dx * 0.055) + 'deg)';
    const threshold = 70;
    const oa = document.getElementById('ol-accept');
    const or_ = document.getElementById('ol-reject');
    if (oa && or_) {
      if (dx > threshold) {
        oa.style.opacity = Math.min(1, (dx - threshold) / 70);
        or_.style.opacity = 0;
      } else if (dx < -threshold) {
        or_.style.opacity = Math.min(1, (-dx - threshold) / 70);
        oa.style.opacity = 0;
      } else {
        oa.style.opacity = 0;
        or_.style.opacity = 0;
      }
    }
    if (e.cancelable) e.preventDefault();
  }

  function up(e) {
    if (!active) return;
    active = false;
    card.classList.remove('dragging');
    const pt = e.changedTouches ? e.changedTouches[0] : e;
    const dx = pt.clientX - startX;
    if (dx > 90) { swipe('accept'); }
    else if (dx < -90) { swipe('reject'); }
    else {
      card.style.transition = 'transform 0.3s ease';
      card.style.transform = '';
      const oa = document.getElementById('ol-accept');
      const or_ = document.getElementById('ol-reject');
      if (oa) oa.style.opacity = 0;
      if (or_) or_.style.opacity = 0;
      setTimeout(() => { card.style.transition = ''; }, 300);
    }
  }

  card.addEventListener('mousedown', down);
  window.addEventListener('mousemove', move);
  window.addEventListener('mouseup', up);
  card.addEventListener('touchstart', down, { passive: false });
  window.addEventListener('touchmove', move, { passive: false });
  window.addEventListener('touchend', up);
}

// ── Swipe ──
function swipe(direction) {
  const paper = getCurrentPaper();
  if (!paper) return;
  const card = document.getElementById('current-card');
  if (!card) return;

  undoHistory.push({ action: direction, id: paper.id, queueIndex: state.currentIndex });
  if (undoHistory.length > 50) undoHistory.shift();

  state.queue.splice(state.currentIndex, 1);
  if (direction === 'accept') {
    state.accepted.unshift(paper.id);
  } else {
    state.rejected.unshift(paper.id);
  }

  card.style.transition = '';
  card.classList.add(direction === 'accept' ? 'swipe-right' : 'swipe-left');
  saveState();
  updateStats();
  renderSidebarPanel(activeTab);
  setTimeout(() => { card.remove(); renderCard(); }, 380);
}

// ── Undo ──
function undo() {
  if (!undoHistory.length) { showToast('Nothing to undo'); return; }
  const last = undoHistory.pop();
  const paper = getPaper(last.id);

  if (last.action === 'accept') {
    state.accepted = state.accepted.filter(x => x !== last.id);
  } else {
    state.rejected = state.rejected.filter(x => x !== last.id);
  }

  const insertAt = Math.min(last.queueIndex, state.queue.length);
  state.queue.splice(insertAt, 0, last.id);
  state.currentIndex = insertAt;

  saveState();
  renderCard();
  renderSidebarPanel(activeTab);
  showToast('Undid: ' + (paper ? paper.title.substring(0,45) : last.id) + '...');
}

function undoPaper(id, action, event) {
  if (event) event.stopPropagation();
  const paper = getPaper(id);
  if (action === 'accept') {
    state.accepted = state.accepted.filter(x => x !== id);
  } else {
    state.rejected = state.rejected.filter(x => x !== id);
  }
  state.queue.push(id);
  saveState();
  updateStats();
  renderSidebarPanel(activeTab);
  showToast('Moved to queue: ' + (paper ? paper.title.substring(0,40) : id) + '...');
}

// ── Stats ──
function updateStats() {
  const remaining = state.queue.length - state.currentIndex;
  document.getElementById('stat-remaining').textContent = remaining;
  document.getElementById('stat-accepted').textContent = state.accepted.length;
  document.getElementById('stat-rejected').textContent = state.rejected.length;
  document.getElementById('tc-accepted').textContent = state.accepted.length;
  document.getElementById('tc-rejected').textContent = state.rejected.length;
  document.getElementById('tc-queue').textContent = remaining;

  const total = PAPERS.length;
  const reviewed = total - remaining;
  const pct = Math.round((reviewed / total) * 100);
  document.getElementById('prog-cur').textContent = Math.min(reviewed + 1, total);
  document.getElementById('prog-tot').textContent = total;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ── Sidebar ──
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelectorAll('.sidebar-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  renderSidebarPanel(tab);
}

function setFilter(topic, el) {
  sidebarFilter = topic;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderSidebarPanel(activeTab);
}

function renderSidebarPanel(tab) {
  const panel = document.getElementById('panel-' + tab);
  let ids, cardClass, action;

  if (tab === 'accepted')      { ids = state.accepted; cardClass = 'accepted'; action = 'accept'; }
  else if (tab === 'rejected') { ids = state.rejected; cardClass = 'rejected'; action = 'reject'; }
  else                         { ids = state.queue.slice(state.currentIndex); cardClass = ''; action = null; }

  let papers = ids.map(id => getPaper(id)).filter(Boolean);
  if (sidebarFilter !== 'all') papers = papers.filter(p => p.topic === sidebarFilter);

  if (!papers.length) {
    panel.innerHTML = '<div class="sidebar-empty">No papers here yet.<br>Start swiping!</div>';
    return;
  }

  const topicClass = p => 'topic-' + p.topic.replace(/ /g,'_').replace(/\//g,'_');

  panel.innerHTML = papers.map(p =>
    '<div class="sidebar-card ' + cardClass + '" onclick="openModal(\'' + p.id + '\')">' +
      '<div class="sc-title">' + esc(p.title) + '</div>' +
      '<div class="sc-meta">' +
        '<span>' + esc(p.year) + '</span>' +
        '<span>·</span>' +
        '<span class="topic-badge ' + topicClass(p) + '" style="font-size:8px;padding:2px 5px">' + esc(p.topic) + '</span>' +
      '</div>' +
      (action
        ? '<button class="sc-undo" onclick="undoPaper(\'' + p.id + '\',\'' + action + '\',event)" title="Move back to queue">&#8617;</button>'
        : '') +
    '</div>'
  ).join('');
}

// ── Modal ──
function openModal(id) {
  const p = getPaper(id);
  if (!p) return;
  const topicClass = 'topic-' + p.topic.replace(/ /g,'_').replace(/\//g,'_');
  document.getElementById('modal-title').textContent = p.title;
  const findingsHtml = p.findings && p.findings.length
    ? '<div class="findings-label" style="margin-bottom:8px">Key Findings</div>' +
      '<ul class="findings-list" style="margin-bottom:16px">' +
      p.findings.map(f => '<li class="finding-item">' + esc(f) + '</li>').join('') +
      '</ul>'
    : '';
  document.getElementById('modal-body').innerHTML =
    '<div class="card-meta" style="margin-bottom:10px">' +
      '<span class="topic-badge ' + topicClass + '">' + esc(p.topic) + '</span>' +
      '<span class="year-tag">' + esc(p.year) + '</span>' +
    '</div>' +
    '<div class="card-authors" style="margin-bottom:8px">' + esc(p.authors) + '</div>' +
    '<div class="card-summary" style="margin-bottom:14px">' + esc(p.summary) + '</div>' +
    findingsHtml +
    (p.citation
      ? '<div style="border-top:1px solid var(--border);padding-top:10px;font-family:DM Mono,monospace;font-size:10px;color:var(--text-dimmer);line-height:1.5">' + esc(p.citation) + '</div>'
      : '');
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

// ── Export ──
function exportData() {
  const accepted = state.accepted.map(id => getPaper(id)).filter(Boolean);
  const rejected = state.rejected.map(id => getPaper(id)).filter(Boolean);
  const data = {
    exported_at: new Date().toISOString(),
    summary: { total: PAPERS.length, accepted: accepted.length, rejected: rejected.length, remaining: state.queue.length - state.currentIndex },
    accepted: accepted.map(p => ({ id: p.id, year: p.year, authors: p.authors, title: p.title, topic: p.topic, citation: p.citation })),
    rejected: rejected.map(p => ({ id: p.id, year: p.year, authors: p.authors, title: p.title, topic: p.topic, citation: p.citation }))
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'paper_review_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Exported!');
}

// ── Reset ──
function resetAll() {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  state = { accepted: [], rejected: [], queue: PAPERS.map(p => p.id), currentIndex: 0 };
  undoHistory = [];
  saveState();
  document.getElementById('btn-accept').disabled = false;
  document.getElementById('btn-reject').disabled = false;
  renderCard();
  ['accepted','rejected','queue'].forEach(renderSidebarPanel);
  updateStats();
  showToast('Reset complete');
}

// ── Toast ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

// ── Keyboard ──
document.addEventListener('keydown', function(e) {
  if (document.getElementById('modal-overlay').classList.contains('open')) {
    if (e.key === 'Escape') closeModal();
    return;
  }
  if (e.key === 'ArrowRight') swipe('accept');
  else if (e.key === 'ArrowLeft') swipe('reject');
  else if (e.key === 'z' || e.key === 'Z') undo();
});

// ── Escape helper ──
function esc(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── Boot ──
loadState();
renderCard();
['accepted','rejected','queue'].forEach(renderSidebarPanel);
updateStats();
</script>
</body>
